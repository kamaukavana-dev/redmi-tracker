<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-width: 300px;
            --text-color: #e6edf3;
            --border-color: #30363d;
            --green: #238636;
            --yellow: #d29922;
            --red: #da3633;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: var(--text-color); height: 100vh; display: flex; }
        #sidebar { width: var(--sidebar-width); background-color: var(--bg-color); border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 20px; font-size: 0.9rem; z-index: 1000; overflow-y: auto; }
        #map { flex-grow: 1; height: 100vh; z-index: 1; }
        .sidebar-header { font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .data-item { display: flex; flex-direction: column; gap: 5px; }
        .data-label { color: #8b949e; font-size: 0.8rem; }
        .data-value { font-family: 'Courier New', Courier, monospace; }
        .battery-level { height: 10px; width: 100%; background: #30363d; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .battery-fill { height: 100%; transition: width 0.3s; }
        .geofence-list { list-style: none; padding-left: 0; }
        .geofence-item { background: #161b22; padding: 8px; border-radius: 4px; margin-bottom: 5px; font-size: 0.85rem; }
        /* Pulsing Marker Animation */
        .pulse-marker { border-radius: 50%; background: #58a6ff; box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.7); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(88, 166, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0); } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">Redmi Tracker</div>
        <div class="data-item">
            <span class="data-label">Battery Level</span>
            <div class="battery-level"><div id="battery-fill" class="battery-fill"></div></div>
            <span id="battery-text" class="data-value">--%</span>
        </div>
        <div class="data-item">
            <span class="data-label">Last Seen</span>
            <span id="last-seen" class="data-value">--</span>
        </div>
        <div class="data-item">
            <span class="data-label">Coordinates</span>
            <span id="coordinates" class="data-value">--</span>
        </div>
        <div class="data-item">
            <span class="data-label">Distance Today (km)</span>
            <span id="distance" class="data-value">--</span>
        </div>
        <div class="data-item">
            <span class="data-label">Active Geofences</span>
            <ul id="geofence-list" class="geofence-list"></ul>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- CONFIGURATION ---
        // SECURITY NOTE: API_KEY is set to placeholder for security.
        const BASE_URL = 'https://fastapi-production-9fb1.up.railway.app';
        const API_KEY = 'YOUR_API_KEY_HERE'; 

        const headers = { 'X-API-Key': API_KEY };

        // --- MAP INITIALIZATION ---
        const map = L.map('map').setView([-1.2921, 36.8219], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB'
        }).addTo(map);

        let latestMarker, polyline, geofenceLayers = [];

        // --- DATA FETCHING ---
        async function fetchData(endpoint) {
            const response = await fetch(`${BASE_URL}${endpoint}`, { headers });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        }

        async function updateDashboard() {
            try {
                const [latest, history, geofences] = await Promise.all([
                    fetchData('/location/latest'),
                    fetchData('/location/history?limit=100'),
                    fetchData('/geofence')
                ]);

                updateSidebar(latest, history, geofences);
                updateMap(latest, history, geofences);
            } catch (err) { console.error('Dashboard update failed:', err); }
        }

        // --- UI UPDATES ---
        function updateSidebar(latest, history, geofences) {
            // Battery
            const battery = latest.battery || 0;
            const fill = document.getElementById('battery-fill');
            fill.style.width = battery + '%';
            fill.style.backgroundColor = battery > 50 ? 'var(--green)' : (battery > 20 ? 'var(--yellow)' : 'var(--red)');
            document.getElementById('battery-text').textContent = battery + '%';

            // Last Seen
            const lastSeen = new Date(latest.recorded_at);
            const diffMin = Math.round((new Date() - lastSeen) / 60000);
            document.getElementById('last-seen').textContent = `${diffMin} minutes ago`;

            // Coordinates
            document.getElementById('coordinates').textContent = `${latest.latitude.toFixed(5)}, ${latest.longitude.toFixed(5)}`;

            // Geofences
            const list = document.getElementById('geofence-list');
            list.innerHTML = geofences.map(f => `<li class="geofence-item">${f.name}</li>`).join('');
        }

        function updateMap(latest, history, geofences) {
            const pos = [latest.latitude, latest.longitude];
            
            // Marker
            if (latestMarker) map.removeLayer(latestMarker);
            latestMarker = L.marker(pos, {
                icon: L.divIcon({ className: 'pulse-marker', iconSize: [16, 16] })
            }).addTo(map);

            // Polyline
            if (polyline) map.removeLayer(polyline);
            const path = history.map(h => [h.latitude, h.longitude]);
            polyline = L.polyline(path, { color: '#58a6ff', weight: 3 }).addTo(map);

            // Geofences
            geofenceLayers.forEach(l => map.removeLayer(l));
            geofenceLayers = geofences.map(f => L.circle([f.latitude, f.longitude], { radius: f.radius_meters, color: 'var(--red)' }).addTo(map));
        }

        // Initial Load + Auto Refresh
        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
